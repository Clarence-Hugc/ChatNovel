// ★ Fix #1: Chat split that keeps closing quotes with their sentence
const CLOSING_QUOTES='\u201D\u2019\uFF09\u300B\u300D\u300F\u0022\u0027';
function splitChat(t){
  const r=t.replace(/\r\n/g,"\n");const ss=[];let b="";let cnt=0;
  for(let i=0;i<r.length;i++){
    b+=r[i];
    if("。！？!?\n".includes(r[i])){
      // Peek ahead: grab any closing quotes
      while(i+1<r.length&&CLOSING_QUOTES.includes(r[i+1])){i++;b+=r[i];}
      cnt++;
      if(cnt>=1+Math.floor(Math.random()*2)){ss.push(b.trim());b="";cnt=0;}
    }
  }
  if(b.trim())ss.push(b.trim());
  return ss.filter(Boolean);
}

function splitParagraph(t,max=280){
  const r=t.replace(/\r\n/g,"\n");const ss=[];let b="";
  for(let i=0;i<r.length;i++){
    b+=r[i];
    if("。！？!?\n".includes(r[i])){
      while(i+1<r.length&&CLOSING_QUOTES.includes(r[i+1])){i++;b+=r[i];}
      ss.push(b);b="";
    }
  }
  if(b.trim())ss.push(b);
  const sg=[];let c="";for(const s of ss){if(c.length+s.length>max&&c){sg.push(c.trim());c=s;}else c+=s;}if(c.trim())sg.push(c.trim());
  const o=[];for(const s of sg){if(s.length>max*1.5){for(let i=0;i<s.length;i+=max)o.push(s.slice(i,i+max).trim());}else o.push(s);}
  return o.filter(Boolean);
}

function ft(d){if(!d)return"";const dd=typeof d==="string"?new Date(d):d;return`${String(dd.getHours()).padStart(2,"0")}:${String(dd.getMinutes()).padStart(2,"0")}`;}

// ★ Fix #11: GBK encoding detection and reading
function readFileWithEncoding(file){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const text=reader.result;
      // Check for garbled text (common sign of wrong encoding)
      const garbledRatio=(text.match(/[\ufffd\u0000-\u0008]/g)||[]).length/text.length;
      if(garbledRatio>0.01){
        // Try GBK
        const reader2=new FileReader();
        reader2.onload=()=>res(reader2.result);
        reader2.onerror=()=>res(text); // fallback
        reader2.readAsText(file,'GBK');
      } else {
        res(text);
      }
    };
    reader.readAsText(file,'UTF-8');
  });
}

  const[si,setSi]=useState(()=>LS.g("si",0));
  const[intv,setIntv]=useState(()=>LS.g("intv",3));
  const[cps,setCps]=useState(()=>LS.g("cps",280));
  const[sName,setSName]=useState(()=>LS.g("sName",DEFAULT_NOVEL_NAME));
  const[accentColor,setAccentColor]=useState(()=>LS.g("accent","#4A90D9"));
  const[bubbleColor,setBubbleColor]=useState(()=>LS.g("bubble","#A0D8F1"));
  const[fontSize,setFontSize]=useState(()=>LS.g("fontSize",14));
  const[pushMode,setPushMode]=useState(()=>LS.g("pushMode","paragraph"));
  const[firstRun,setFirstRun]=useState(()=>LS.g("firstRun",true));
  const[closeAction,setCloseActionState]=useState(()=>LS.g("closeAction","ask")); // 'ask'|'quit'|'tray'
  // ★ Fix #7: Per-book progress storage
  const[bookProgress,setBookProgress]=useState(()=>LS.g("bookProgress",{})); // {bookId: {chIdx, si, nMsgs}}

  const[activeId,setActiveId]=useState("c1");
  const[segs,setSegs]=useState([]);
  const[run,setRun]=useState(false);
  const[typing,setTyping]=useState(false);
  const[inp,setInp]=useState("");
  const[fInp,setFInp]=useState({});
  const[panel,setPanel]=useState(null);
  const[modal,setModal]=useState(null);
  const[editT,setEditT]=useState(null);
  const[ncN,setNcN]=useState("");const[ncM,setNcM]=useState("");const[ncAva,setNcAva]=useState(null);
  const[emT,setEmT]=useState("");
  const[fileTip,setFileTip]=useState(false);
  const[resumed,setResumed]=useState(false);
  const[delBookId,setDelBookId]=useState(null);

  const endRef=useRef(null);const timerRef=useRef(null);
  const siR=useRef(si);const ssR=useRef(segs);  useEffect(()=>{siR.current=si;},[si]);
  useEffect(()=>{ssR.current=segs;},[segs]);

  // First run guide
  useEffect(()=>{if(firstRun){setModal("disclaimer");};},[]);

  // ★ Fix #5: Listen for restore-from-tray event
  useEffect(()=>{
    if(!__T)return;
    let unlisten;
    listen('restored-from-tray',()=>{setResumed(false);setRun(false);setContacts(cc=>{const first=cc.find(c=>!c.isNovel);setActiveId(first?first.id:"novel");return cc;});}).then(fn=>{unlisten=fn;});
    return()=>{if(unlisten)unlisten();};
  },[]);

  // ★ Fix #6: Listen for close-requested event
  useEffect(()=>{
    if(!__T)return;
    let unlisten;
    listen('win-close-requested',(ev)=>{
      const action=ev.payload;
      if(action==='quit')winQuit();
      else if(action==='tray')winHide();
      else setModal('closeConfirm');
    }).then(fn=>{unlisten=fn;});
    return()=>{if(unlisten)unlisten();};
  },[]);

  // Sync close action to main process
  useEffect(()=>{setCloseAction(closeAction);},[closeAction]);

  // Persist
  useEffect(()=>{LS.s("myAva",myAva);},[myAva]);
  useEffect(()=>{LS.s("contacts",contacts);},[contacts]);
  useEffect(()=>{const meta=books.map(b=>({id:b.id,title:b.title,author:b.author,chapters:b.chapters.map(c=>({title:c.title}))}));LS.s("books",meta);},[books]);
  useEffect(()=>{LS.s("abId",abId);},[abId]);
  useEffect(()=>{LS.s("chIdx",chIdx);},[chIdx]);
  useEffect(()=>{if(nMsgs.length>300){setNMsgs(p=>p.slice(-200));}LS.s("nMsgs",nMsgs.length>200?nMsgs.slice(-200):nMsgs);},[nMsgs]);
  useEffect(()=>{LS.s("si",si);},[si]);
  useEffect(()=>{LS.s("intv",intv);},[intv]);
  useEffect(()=>{LS.s("cps",cps);},[cps]);
  useEffect(()=>{LS.s("sName",sName);},[sName]);
  useEffect(()=>{LS.s("accent",accentColor);},[accentColor]);
  useEffect(()=>{LS.s("bubble",bubbleColor);},[bubbleColor]);
  useEffect(()=>{LS.s("fontSize",fontSize);},[fontSize]);
  useEffect(()=>{LS.s("pushMode",pushMode);},[pushMode]);
  useEffect(()=>{LS.s("firstRun",firstRun);},[firstRun]);
  useEffect(()=>{LS.s("closeAction",closeAction);},[closeAction]);
  useEffect(()=>{LS.s("bookProgress",bookProgress);},[bookProgress]);

  const scroll=useCallback(()=>{setTimeout(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),60);},[]);
  const aBook=useMemo(()=>books.find(b=>b.id===abId),[books,abId]);
  const aCon=useMemo(()=>contacts.find(c=>c.id===activeId),[contacts,activeId]);
  const isR=!!aBook;
  const showNovel=activeId==="novel"&&isR&&resumed;
  const novelContact=contacts.find(c=>c.isNovel);

  const makeSplit=useCallback((text)=>{return pushMode==="chat"?splitChat(text):splitParagraph(text,cps);},[pushMode,cps]);

  // Rebuild segs on mount
  const[curChContent,setCurChContent]=useState("");
  const prevSplitKey=useRef("");
  // Rebuild segs when content or split settings change
  useEffect(()=>{
    if(!curChContent)return;
    const newSegs=makeSplit(curChContent);
    const splitKey=pushMode+"|"+cps;
    const isInitialLoad=segs.length===0;
    const isContentChange=prevSplitKey.current==="" || prevSplitKey.current===splitKey;
    prevSplitKey.current=splitKey;
    if(isInitialLoad||isContentChange){
      // Initial load or new chapter: just set segs, keep si from localStorage/loadCh
      setSegs(newSegs);
    } else {
      // Mode/cps changed: map si by character offset
      // Roll back ~100 chars for reading context continuity
      const oldCharCount=segs.slice(0,si).join("").length;
      const targetOffset=Math.max(0,oldCharCount-100);
      let newSi=0;
      if(targetOffset>0){
        let acc=0;
        for(let i=0;i<newSegs.length;i++){
          acc+=newSegs[i].length;
          if(acc>targetOffset){newSi=i;break;}
          newSi=i+1;
        }
        if(newSi>newSegs.length)newSi=newSegs.length;
      }
      setSegs(newSegs);setSi(newSi);
    }
  },[curChContent,cps,pushMode]);
  // Load chapter content from FS on mount or chapter change
  useEffect(()=>{if(aBook&&aBook.chapters[chIdx]){loadChapterFromFS(aBook.id,chIdx).then(c=>{setCurChContent(c);}).catch(()=>{});}},[abId,chIdx]);

  // ★ Fix #7: Save current book progress before switching
  const saveProgress=useCallback(()=>{
    if(!abId)return;
    setBookProgress(prev=>({...prev,[abId]:{chIdx,si,nMsgs:nMsgs.slice(-50)}}));
  },[abId,chIdx,si,nMsgs]);

  // ★ Fix #9: Auto next chapter
  const autoNextCh=useCallback(async()=>{
    if(!aBook||chIdx>=aBook.chapters.length-1)return false;
    const nextIdx=chIdx+1;
    setChIdx(nextIdx);
    let content;
    try{content=await loadChapterFromFS(aBook.id,nextIdx);}catch(e){console.warn("autoNextCh FS error",e);return false;}
    setCurChContent(content);
    const s=makeSplit(content);
    setSegs(s);setSi(0);
    setNMsgs(prev=>[...prev,{type:"system",text:`── ${aBook.chapters[nextIdx].title} ──`}]);
    if(s.length>0){setTimeout(()=>{setNMsgs(p=>[...p,{text:s[0],time:new Date().toISOString(),fromMe:false}]);setSi(1);scroll();},400);}
    return true;
  },[aBook,chIdx,makeSplit,scroll]);

  const loadCh=useCallback(async(bk,idx)=>{
    if(!bk?.chapters?.[idx])return;
    let content;
    try{content=await loadChapterFromFS(bk.id,idx);}catch(e){console.warn("loadCh FS error",e);return;}
    setCurChContent(content);
    const s=makeSplit(content);setSegs(s);setSi(0);setRun(false);
    setNMsgs(prev=>[...prev,{type:"system",text:`── ${bk.chapters[idx].title} ──`}]);
    if(s.length>0){setTimeout(()=>{setNMsgs(p=>[...p,{text:s[0],time:new Date().toISOString(),fromMe:false}]);setSi(1);scroll();},400);}
  },[makeSplit,scroll]);

  const loadDemo=async()=>{
    if(!books.find(b=>b.id==="demo1")){
      await saveBookToFS("demo1",SAMPLE_CHAPTERS);
      setBooks(p=>[...p,SAMPLE_META]);
    }
    setAbId("demo1");setChIdx(0);loadCh(SAMPLE_META,0);setActiveId("novel");setFileTip(false);setResumed(true);
  };

  // ★ Fix #10 & #11: File upload with encoding detection and size warning
  const handleUpload=async(e)=>{
    const f=e.target.files?.[0];if(!f)return;
    // ★ Fix #10: Warn for very large files
    if(f.size>10*1024*1024){toast.show("文件较大，加载可能需要一些时间");} 
    const raw=await readFileWithEncoding(f);
    const pat=/^第[一二三四五六七八九十百千万\d]+[章节回]\s*.*/gm;
    const ms=[...raw.matchAll(pat)];let chs;
    if(ms.length>=2){chs=ms.map((m,i)=>{const s=m.index,en=ms[i+1]?.index??raw.length;const b=raw.slice(s,en).trim(),fl=b.split("\n")[0].trim();return{title:fl,content:b.split("\n").slice(1).join("\n").trim()||b};});}
    else{
      // ★ Fix #10: For very large single-chapter files, split into virtual chapters of ~5000 chars
      if(raw.length>20000){
        chs=[];const chunkSize=5000;
        for(let i=0;i<raw.length;i+=chunkSize){
          const chunk=raw.slice(i,Math.min(i+chunkSize,raw.length));
          chs.push({title:`第${chs.length+1}节`,content:chunk.trim()});
        }
      } else {
        chs=[{title:"全文",content:raw}];
      }
    }
    const bookTitle=f.name.replace(/\.txt$/i,"");
    const existing=books.find(b=>b.title===bookTitle);
    if(existing){
      const confirmReplace=window.confirm(`「${bookTitle}」已在书架中，是否替换？`);
      if(!confirmReplace){e.target.value="";return;}
      rmBook(existing.id);
    }
    const id="b"+Date.now();
    // Save current book progress before switching to new one
    saveProgress();
    // Save chapter contents to file system
    await saveBookToFS(id,chs);
    // Store only metadata (titles) in localStorage
    const meta={id,title:bookTitle,author:"未知",chapters:chs.map(c=>({title:c.title}))};
    setBooks(p=>[...p,meta]);setAbId(id);setChIdx(0);loadCh(meta,0);setActiveId("novel");setFileTip(false);setPanel(null);setResumed(true);
    e.target.value="";
  };

  // Auto push with auto-next-chapter
  useEffect(()=>{
    if(!run){if(timerRef.current)clearInterval(timerRef.current);return;}
    const baseIntv=pushMode==="chat"?(intv*500+Math.random()*intv*800):(intv*1000);
    timerRef.current=setInterval(()=>{
      const i=siR.current,ss=ssR.current;
      if(i>=ss.length){
        // ★ Fix #9: Try auto next chapter
        autoNextCh().then(ok=>{if(!ok)setRun(false);});
        return;
      }
      setTyping(true);
      const delay=pushMode==="chat"?(200+Math.random()*800):(300+Math.random()*500);
      setTimeout(()=>{setNMsgs(p=>[...p,{text:ss[i],time:new Date().toISOString(),fromMe:false}]);setSi(i+1);setTyping(false);scroll();},delay);
    },baseIntv);
    return()=>clearInterval(timerRef.current);
  },[run,intv,scroll,pushMode,autoNextCh]);

  const prevNMsgsLen=useRef(nMsgs.length);
  useEffect(()=>{if(nMsgs.length>prevNMsgsLen.current){scroll();}prevNMsgsLen.current=nMsgs.length;},[nMsgs,scroll]);

  // ★ Fix #9: Manual next also auto-advances chapter
  const pushNext=useCallback(()=>{
    if(si>=segs.length){autoNextCh();return;}
    setTyping(true);
    setTimeout(()=>{setNMsgs(p=>[...p,{text:segs[si],time:new Date().toISOString(),fromMe:false}]);setSi(si+1);setTyping(false);},200);
  },[si,segs,autoNextCh]);

  // Hold-to-accelerate: while mouse is held down, push a segment every 150ms
  const holdTimerRef=useRef(null);
  const holdStart=useCallback(()=>{
    if(holdTimerRef.current)return;
    // Push immediately, then every 150ms
    const push=()=>{
      const i=siR.current,ss=ssR.current;
      if(i>=ss.length){autoNextCh();return;}
      setNMsgs(p=>[...p,{text:ss[i],time:new Date().toISOString(),fromMe:false}]);setSi(i+1);scroll();
    };
    push();
    holdTimerRef.current=setInterval(push,150);
  },[autoNextCh,scroll]);
  const holdEnd=useCallback(()=>{
    if(holdTimerRef.current){clearInterval(holdTimerRef.current);holdTimerRef.current=null;}
  },[]);

  const goCh=(i)=>{setChIdx(i);setRun(false);loadCh(aBook,i);setPanel(null);};

  // ★ Fix #7: Switch book with progress save/restore
  const switchBook=(bid)=>{
    saveProgress();
    const b=books.find(x=>x.id===bid);if(!b)return;
    setAbId(bid);
    // Restore progress if exists
    const prog=bookProgress[bid];
    if(prog){
      setChIdx(prog.chIdx);setSi(prog.si);
      loadChapterFromFS(bid,prog.chIdx).then(c=>{setCurChContent(c);setSegs(makeSplit(c));}).catch(()=>{});
      setNMsgs(prog.nMsgs||[{type:"system",text:`── ${b.chapters[prog.chIdx]?.title||"继续阅读"} ──`}]);
    } else {
      setChIdx(0);loadCh(b,0);
    }
    setPanel(null);setActiveId("novel");setResumed(true);setRun(false);
  };

  const rmBook=(bid)=>{
    deleteBookFromFS(bid).catch(()=>{});
    setBooks(p=>p.filter(b=>b.id!==bid));
    setBookProgress(prev=>{const n={...prev};delete n[bid];return n;});
    if(abId===bid){setAbId(null);setSegs([]);setSi(0);setCurChContent("");}
  };

  const sendNovel=()=>{if(!inp.trim())return;setNMsgs(p=>[...p,{text:inp.trim(),time:new Date().toISOString(),fromMe:true}]);setInp("");scroll();};
  const sendFake=(cid,txt)=>{if(!txt?.trim())return;setContacts(p=>p.map(c=>c.id===cid?{...c,msgs:[...c.msgs,{fromMe:true,text:txt.trim(),time:new Date().toISOString()}]}:c));scroll();};

  // ★ Fix #2: Sender name syncs to sidebar
  const updateSName=(v)=>{setSName(v);setContacts(p=>p.map(c=>c.isNovel?{...c,name:v}:c));};

  const addContact=()=>{if(!ncN.trim()){toast.show("请输入昵称");return;}const id="u"+Date.now();const msgs=ncM.trim()?ncM.split("\n").filter(l=>l.trim()).map((l,i)=>{const me=l.startsWith(">");const t=new Date();t.setMinutes(t.getMinutes()-(ncM.split("\n").length-i)*3);return{fromMe:me,text:me?l.slice(1).trim():l.trim(),time:t.toISOString()};}):[]; setContacts(prev=>{const c=[...prev];c.splice(1,0,{id,name:ncN.trim(),avatarUrl:ncAva||ava(ncN.trim()),msgs});return c;});setModal(null);setNcN("");setNcM("");setNcAva(null);toast.show("联系人已创建");};
  // ★ Fix #8: Delete works for all non-novel contacts
  const delContact=(cid)=>{if(cid==="novel")return;setContacts(p=>{const next=p.filter(c=>c.id!==cid);if(activeId===cid){const first=next.find(c=>!c.isNovel);setActiveId(first?first.id:"novel");}return next;});toast.show("已删除");};
  const handleContactAva=async(cid,e)=>{const f=e.target.files?.[0];if(!f)return;const b64=await cropSquare(f);setContacts(p=>p.map(c=>c.id===cid?{...c,avatarUrl:b64}:c));e.target.value="";toast.show("头像已更新");};
  const startEdit=(cid,mi,txt)=>{setEditT({cid,mi});setEmT(txt);setModal("editMsg");};
  const saveEdit=()=>{if(!editT)return;setContacts(p=>p.map(c=>c.id!==editT.cid?c:{...c,msgs:c.msgs.map((m,i)=>i===editT.mi?{...m,text:emT}:m)}));setModal(null);toast.show("已保存");};
  const addTheirMsg=(cid)=>{setEditT({cid});setEmT("");setModal("addMsg");};
  const handleMyAva=async(e)=>{const f=e.target.files?.[0];if(!f)return;setMyAva(await cropSquare(f));e.target.value="";toast.show("头像已更新");};

  // ★ Fix #4: Esc hides to tray
  useEffect(()=>{const h=(e)=>{if(modal)return;if(e.key==="Escape"){winHide();setRun(false);}if(e.ctrlKey&&e.key===" "){e.preventDefault();if(aBook&&resumed)setRun(r=>!r);}if(e.ctrlKey&&e.key==="ArrowDown"){e.preventDefault();pushNext();}if(e.ctrlKey&&e.key==="ArrowRight"){e.preventDefault();if(aBook&&si>=segs.length)autoNextCh();}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[modal,aBook,resumed,si,segs,pushNext,autoNextCh]);
  useEffect(()=>{if(!fileTip)return;const h=()=>setFileTip(false);setTimeout(()=>document.addEventListener("click",h,{once:true}),0);},[fileTip]);

  const progress=segs.length>0?Math.round((si/segs.length)*100):0;

  // Contact preview — never leak novel content
  const cv=contacts.map(c=>{
    if(c.isNovel){const um=nMsgs.filter(m=>!m.type&&m.fromMe);const lu=um.slice(-1)[0];return{...c,_lm:lu?lu.text.slice(0,22):(isR?"[文件]":""),_t:isR?ft(new Date()):ft(new Date(mkT(8,30))),_dot:run};}
    const last=c.msgs.slice(-1)[0];return{...c,_lm:last?(last.sender?last.sender+": ":"")+last.text.slice(0,22):"",_t:last?ft(last.time):""};
  });

  const icoEmoji=<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C" strokeWidth="1.4" onClick={wip}><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>;
  const icoClip=<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C" strokeWidth="1.4"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>;

  return(<div className="root">{toast.el}
    <div className="wc">
      <div className="wc-b" onClick={winMin}><svg width="12" height="1" viewBox="0 0 12 1"><rect width="12" height="1" fill="currentColor"/></svg></div>
      <div className="wc-b" onClick={winMax}><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1"><rect x=".5" y=".5" width="11" height="11" rx="1"/></svg></div>
      <div className="wc-b close" onClick={()=>{if(closeAction==='quit')winQuit();else if(closeAction==='tray')winHide();else setModal('closeConfirm');}}><svg width="12" height="12" viewBox="0 0 12 12" stroke="currentColor" strokeWidth="1.2"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg></div>
    </div>

    <div className="nav drag">
      <label className="nav-a nodrag"><img src={myAva} alt=""/><input type="file" accept="image/*" onChange={handleMyAva} style={{display:"none"}}/></label>
      <div className="nb nodrag" style={{background:"rgba(255,255,255,.12)"}}><svg width="22" height="22" viewBox="0 0 24 24" fill={accentColor} stroke={accentColor} strokeWidth="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
      <div className="nb nodrag" onClick={wip}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#A0A0A0" strokeWidth="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
      <div className="nb nodrag" onClick={wip}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#A0A0A0" strokeWidth="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></div>
      <div style={{flex:1}}/>
      <div className="nb nodrag" onClick={wip}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0A0A0" strokeWidth="1.5"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/></svg></div>
    </div>

    <div className="sb">
      <div className="sb-s drag" style={{paddingTop:12}}>
        <div className="sb-sb nodrag" onClick={wip}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><span>搜索</span></div>
        <div className="sb-p nodrag" onClick={()=>{setNcN("");setNcM("");setNcAva(null);setModal("addContact");}} title="新建联系人"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
      </div>
      <div className="cl nodrag">
        {cv.map(c=>(
          <div key={c.id} className={`ci ${activeId===c.id?"on":""}`} onClick={()=>{setActiveId(c.id);setPanel(null);setInp("");setFileTip(false);}}>
            <div className="ci-a" style={{position:"relative"}}>
              <label style={{cursor:"pointer",display:"block",width:"100%",height:"100%"}} onClick={e=>e.stopPropagation()}><img src={c.avatarUrl} alt=""/><input type="file" accept="image/*" onChange={e=>handleContactAva(c.id,e)} style={{display:"none"}}/></label>
              {c._dot&&<div className="ci-d"/>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><span className="ci-n">{c.name}</span><span className="ci-t">{c._t}</span></div>
              <div className="ci-m">{c._lm}</div>
            </div>
            {!c.isNovel&&<span className="ci-x" onClick={e=>{e.stopPropagation();delContact(c.id);}}>✕</span>}
          </div>
        ))}
      </div>
    </div>

    <div className="main nodrag">
      <div className="cw" style={{display:activeId==="novel"?"flex":"none"}}>
          <div className="ch">

    {modal==="editMsg"&&<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()}><h3>编辑消息</h3><label>消息内容</label><textarea value={emT} onChange={e=>setEmT(e.target.value)} autoFocus/><div className="md-b"><button style={{background:"#F0F0F0",color:"#666"}} onClick={()=>setModal(null)}>取消</button><button style={{background:accentColor,color:"#fff"}} onClick={saveEdit}>保存</button></div></div></div>}
    {modal==="addMsg"&&<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()}><h3>添加对方消息</h3><label>消息内容</label><textarea value={emT} onChange={e=>setEmT(e.target.value)} placeholder="输入对方发给你的消息" autoFocus/><div className="md-b"><button style={{background:"#F0F0F0",color:"#666"}} onClick={()=>setModal(null)}>取消</button><button style={{background:accentColor,color:"#fff"}} onClick={()=>{if(!emT.trim()||!editT)return;setContacts(p=>p.map(c=>c.id!==editT.cid?c:{...c,msgs:[...c.msgs,{fromMe:false,text:emT.trim(),time:new Date().toISOString()}]}));setModal(null);toast.show("已添加");}}>添加</button></div></div></div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
